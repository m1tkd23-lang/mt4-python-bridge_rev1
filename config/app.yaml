# config\app.yaml
bridge:
  root: "C:/Users/toku/AppData/Roaming/MetaQuotes/Terminal/F1DD1D6E7C4A311D1B1CA0D34E33291D/MQL4/Files/mt4-python-bridge"
  market_snapshot_filename: "market_snapshot.json"
  runtime_status_filename: "runtime_status.json"
  position_snapshot_filename: "position_snapshot.json"

snapshot:
  market_stale_seconds: 10
  runtime_stale_seconds: 10

signal:
  enabled: true
  strategy_name: "bollinger_combo_AB"

# Note: SL/TP は戦術ファイル側で定義する (各戦術の SL_PIPS / TP_PIPS)
# - bollinger_range_A: SL=20 / TP=20
# - bollinger_trend_B: SL=20 / TP=40
# - bollinger_combo_AB: lane 別に子戦術 (range=A, trend=B) の値を使用
# config/app.yaml には risk セクションを置かない。

runtime:
  state_file: "runtime/state.json"
  skip_if_pending_command: true